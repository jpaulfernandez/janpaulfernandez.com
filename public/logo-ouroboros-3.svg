<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Ouroboros vine v3 — "The Line": lighter stroked vine, growth curling
       inward to feed on its own ending. More delicate, monogram-friendly. -->
  <path d="M 32 10 A 22 22 0 1 1 12.95 43" stroke="#3B5240" stroke-width="3.2" stroke-linecap="round"/>
  <circle cx="10.75" cy="37.7" r="1.7" fill="#3B5240" opacity="0.7"/>
  <circle cx="10" cy="32" r="1.2" fill="#3B5240" opacity="0.45"/>
  <circle cx="10.75" cy="26.3" r="0.8" fill="#3B5240" opacity="0.25"/>
  <path d="M 32 10 C 34 4 40 0.5 46.5 2 C 45 8.5 38.5 11.5 33 10.6 Z" fill="#3B5240"/>
  <path d="M 31.5 10.4 C 29.5 5 25 2.5 19.5 3.5 C 21 9 26 11.6 31 10.9 Z" fill="#E8A13C"/>
  <!-- Inner curl: the new shoot bending back toward the tail -->
  <path d="M 30 13.5 Q 24 18 25.5 25" stroke="#3B5240" stroke-width="2" stroke-linecap="round"/>
</svg>
